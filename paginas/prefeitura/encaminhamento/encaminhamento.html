<!DOCTYPE html>
<html lang="pt-BR">

<head>

    <meta charset="UTF-8">

    <meta
        name="viewport"
        content="width=device-width, initial-scale=1.0">

    <title>
        Palhoça Fácil - Encaminhamento
    </title>

    <link rel="stylesheet" href="encaminhamento.css">

</head>

<body>

<div class="container">

    <!-- SIDEBAR -->

    <aside class="sidebar">

        <div class="logo">

            <h2>

                PREFEITURA
                <br>
                PALHOÇA

            </h2>

        </div>

        <nav>

            <button
                id="btnDashboard"
                class="menu">

                📥 Recebidas

            </button>

            <button
                id="btnEncaminhar"
                class="menu active">

                🏛️ Em Atendimento

            </button>

        </nav>

        <button
            id="btnSair"
            class="sair">

            🚪 Sair

        </button>

    </aside>

    <!-- ÁREA CENTRAL -->

    <main class="conteudo">

        <div class="topo">

            <h2>

                Quadro de Encaminhamento

            </h2>

        </div>

        <div
            id="kanban"
            class="kanban">

        </div>

    </main>

    <!-- PAINEL -->

    <aside class="painel">

        <h2>

            Denúncia

        </h2>

        <label>

            Protocolo

        </label>

        <input
            id="protocolo"
            disabled>

        <label>

            Usuário

        </label>

        <input
            id="usuario">

        <label>

            Email

        </label>

        <input
            id="email">

        <label>

            Tipo

        </label>

        <input
            id="tipo">

        <label>

            Bairro

        </label>

        <input
            id="bairro">

        <label>

            Rua

        </label>

        <input
            id="rua">

        <label>

            Comentário

        </label>

        <textarea
            id="comentario">

        </textarea>

        <label>

            Arquivo

        </label>

        <input
            id="arquivo">

        <label>

            Departamento

        </label>

        <select
            id="departamento">

            <option>

                Nova

            </option>

            <option>

                Em análise

            </option>

            <option>

                Aguardando informação / aprovação

            </option>

            <option>

                Aprovado

            </option>

            <option>

                Em execução

            </option>

            <option>

                Resolvido

            </option>

        </select>

        <button
            id="btnSalvar">

            Atualizar denúncia

        </button>

    </aside>

</div>

<script src="pref_storage.js"></script>
<script src="pref_editor.js"></script>
<script src="pref_kanban.js"></script>
<script src="pref_encaminhamento.js"></script>

</body>

</html>

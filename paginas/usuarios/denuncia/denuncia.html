<!DOCTYPE html>
<html lang="pt-BR">

<head>

    <meta charset="UTF-8">

    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Nova Denúncia</title>

    <link rel="stylesheet" href="denuncia.css">

</head>

<body>

    <div class="tela">

        <div class="topo">

            <a href="#" class="voltar" onclick="return voltarDenuncia()">
                ←
            </a>

            <div class="logo">

                <img src="../../../anexos/imagens/image 9.png" alt="">

            </div>

            <h1>Nova Denúncia</h1>

            <p>Reporte problemas urbanos da cidade</p>

        </div>

        <div class="formulario">

            <!-- NOVO: BAIRRO -->
            <label>
                Nome do bairro
            </label>

            <input type="text" id="bairro" placeholder="Digite o nome do bairro">

            <!-- NOVO: RUA -->
            <label>
                Nome da rua
            </label>

            <input type="text" id="rua" placeholder="Digite o nome da rua">

            <label>
                Tipo do problema
            </label>

            <div class="campo-select">

                <select id="tipo">

                    <option value="">
                        Selecione
                    </option>

                    <option>Calçada quebrada</option>
                    <option>Falta de acessibilidade</option>
                    <option>Buraco na rua</option>
                    <option>Lixo acumulado</option>
                    <option>Semáforo quebrado</option>
                    <option>Poste danificado</option>
                    <option>Vazamento</option>
                    <option>Outro</option>

                </select>

            </div>

            <label>
                Foto ou vídeo
            </label>

            <input type="file" id="arquivo" accept="image/*,video/*" hidden>

            <button type="button" class="upload" onclick="abrirArquivo()">
                📷 Anexar mídia
            </button>

            <div id="arquivoNome">
                Nenhum arquivo selecionado
            </div>

            <label>
                Endereço da denuncia e Comentários
            </label>

            <textarea id="comentario" placeholder="Descreva o problema encontrado..."></textarea>

            <button type="button" class="botao-enviar" onclick="enviarDenuncia()">
                Enviar denúncia
            </button>

        </div>

    </div>

    <div class="modal escondido" id="modalSucesso">

        <div class="modal-box">

            <div class="icone-sucesso">
                ✓
            </div>

            <h2>Denúncia enviada!</h2>

            <p>Seu protocolo é:</p>

            <div id="codigo">PAL-000000</div>

            <button class="botao-enviar" onclick="fecharModal()">
                Fechar
            </button>

        </div>

    </div>

    <script src="denuncia.js"></script>

</body>

</html>

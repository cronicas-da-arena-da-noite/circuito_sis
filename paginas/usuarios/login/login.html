<!DOCTYPE html>
<html lang="pt-BR">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login</title>
    <link rel="stylesheet" href="login.css">
</head>

<body>

    <div class="tela">

        <div class="topo">

            <a href="../../../index.html" class="voltar">
                ←
            </a>

            <h1>Login</h1>

        </div>

        <div class="conteudo">

            <div class="logo">
                <img src="../../../anexos/imagens/image 9.png" alt="">
            </div>

            <input
                id="email"
                type="email"
                placeholder="Email"
            >

            <input
                id="senha"
                type="password"
                placeholder="Senha"
            >

            <a href="#" class="recuperar">
                Recuperar senha
            </a>

            <a
                href="#"
                class="botao"
                id="btnEntrar"
            >
                Entrar
            </a>

            <div class="cadastro-texto">
                Ainda não possui uma conta?
            </div>

            <a href="../criar/criar.html" class="botao">
                Criar conta
            </a>

        </div>

    </div>

    <script src="login.js"></script>

</body>

</html>

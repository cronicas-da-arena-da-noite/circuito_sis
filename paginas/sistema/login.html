<!DOCTYPE html>
<html lang="pt-BR">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Palhoça Fácil - Administração</title>

    <link rel="stylesheet" href="login.css">
</head>

<body>

    <div class="container">

        <div class="lado-esquerdo">

            <img
                src="../../anexos/imagens/image 9.png"
                alt="Logo"
                class="logo"
            >

            <h1>
                Palhoça Fácil
            </h1>

            <h2>
                Painel Administrativo
            </h2>

            <p>
                Sistema interno de gerenciamento
                e acompanhamento de denúncias.
            </p>

        </div>

        <div class="lado-direito">

            <div class="card-login">

                <h2>
                    Acesso Administrativo
                </h2>

                <input
                    type="text"
                    id="login"
                    placeholder="Usuário"
                >

                <input
                    type="password"
                    id="senha"
                    placeholder="Senha"
                >

                <button
                    id="btnEntrar"
                >
                    Entrar
                </button>

            </div>

        </div>

    </div>

    <script src="login.js"></script>

</body>

</html>
